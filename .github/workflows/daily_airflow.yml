name: Daily Air Quality Pipeline

on:
  schedule:
    - cron: '0  * * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/air-quality

jobs:
  check-changes:
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check if DAG files changed
        id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "dags/\|Dockerfile\|requirements.txt"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/air-quality:latest
            ghcr.io/${{ github.repository }}/air-quality:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  run-pipeline:
    needs: [check-changes, build-and-push]
    if: always() && needs.check-changes.result != 'skipped'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install apache-airflow==2.8.1
          pip install -r requirements.txt
      
      - name: Configure Airflow
        run: |
          export AIRFLOW_HOME=${{ github.workspace }}/airflow
          mkdir -p $AIRFLOW_HOME/dags
          cp -r dags/* $AIRFLOW_HOME/dags/
          
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@localhost:5432/airflow
          export AIRFLOW__CORE__EXECUTOR=LocalExecutor
          export AIRFLOW__CORE__LOAD_EXAMPLES=False
          export AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
          
          airflow db init
      
      - name: Run DAG directly (skip scheduler)
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Exécution directe sans scheduler
          airflow tasks test air_quality_pipeline extract_data 2024-01-01
          airflow tasks test air_quality_pipeline transform_data 2024-01-01
          airflow tasks test air_quality_pipeline load_data 2024-01-01
      
      - name: Cleanup
        if: always()
        run: |
          docker stop postgres || true
          rm -rf ${{ github.workspace }}/airflow