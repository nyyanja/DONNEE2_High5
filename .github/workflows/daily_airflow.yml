name: Air Quality ETL Pipeline

on:
  schedule:
    - cron: '0 * * * *'       
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect real-time data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python src/collect.py

      - name: Check if backfill needed today
        id: check_backfill
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f last_backfill_date.txt ] && [ "$(cat last_backfill_date.txt)" = "$TODAY" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Backfill déjà exécuté aujourd'hui, on ignore."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Backfill historical data
        if: steps.check_backfill.outputs.skip != 'true'
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          python src/backfill.py --months 12
          date +%Y-%m-%d > last_backfill_date.txt

      - name: Clean and normalize data
        run: python src/clean.py

      - name: Validate clean dataset
        run: python src/validate_clean.py

      - name: Load into data warehouse
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python src/load_warehouse.py

      - name: Commit and push updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/ clean/air_quality_clean.csv last_backfill_date.txt
          git diff --staged --quiet || git commit -m "data: automated collection $(date +%Y-%m-%d_%H:%M)"
          git push

      - name: Send success email notification
        if: success()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[GitHub Actions] Pipeline ETL Réussi"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions Pipeline
          body: |
            Le pipeline ETL s'est exécuté avec succès.
            Dépôt : ${{ github.repository }}
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Logs : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email notification
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "[GitHub Actions] ÉCHEC du Pipeline ETL"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions Pipeline
          body: |
            Une erreur est survenue lors de l'exécution du pipeline ETL.
            Dépôt : ${{ github.repository }}
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Logs : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}